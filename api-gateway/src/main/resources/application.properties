spring.application.name=api-gateway
server.port=8080
# Spring Cloud compatibility check disabled
spring.cloud.compatibility-verifier.enabled=false
spring.main.allow-bean-definition-overriding=true
# Config Server
spring.cloud.config.uri=${CONFIG_URI:http://localhost:8888}
spring.config.import=optional:configserver:${CONFIG_URI:http://localhost:8888}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}
# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8761/eureka}
eureka.instance.hostname=api-gateway
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
# Spring Cloud Gateway - Discovery Locator
spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.gateway.discovery.locator.lower-case-service-id=true
# Actuator
management.endpoints.web.exposure.include=*
# Gateway Routes
# Not: Route tan?mlar? Config Server'dan gelir (api-gateway.properties / api-gateway-prod.properties)
# JWT Secret (same as auth-service - HS256)
jwt.secret=${JWT_SECRET:marketplace-super-secret-key-for-hs256-2024!}
