spring.application.name=api-gateway
server.port=8080

# Spring Cloud compatibility check disabled
spring.cloud.compatibility-verifier.enabled=false
spring.main.allow-bean-definition-overriding=true

# Config Server
spring.cloud.config.uri=${CONFIG_URI:http://localhost:8888}
spring.config.import=optional:configserver:${CONFIG_URI:http://localhost:8888}

# Config Server Retry
spring.cloud.config.fail-fast=true
spring.cloud.config.retry.max-attempts=20
spring.cloud.config.retry.initial-interval=2000
spring.cloud.config.retry.max-interval=10000
spring.cloud.config.retry.multiplier=1.5

spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8761/eureka}
eureka.instance.hostname=api-gateway
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Spring Cloud Gateway - Discovery Locator
spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Actuator
management.endpoints.web.exposure.include=*
management.endpoint.gateway.enabled=true

# Gateway Routes
# Not: Route tanimlari Config Server'dan gelir (api-gateway.properties / api-gateway-prod.properties)

# JWT Secret (same as auth-service - HS256)
jwt.secret=${JWT_SECRET:marketplace-super-secret-key-for-hs256-2024!}