server.port=8081

# Database
spring.datasource.url=jdbc:postgresql://auth-postgres:5432/auth_db
spring.datasource.username=postgres
spring.datasource.password=${AUTH_DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Eureka
eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka
eureka.instance.hostname=auth-service
eureka.instance.prefer-ip-address=true

# JWT
jwt.secret=${JWT_SECRET:marketplace-super-secret-key-for-hs256-2024!}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# RabbitMQ
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER:marketplace_admin}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:SaforyRabbit2024!}

spring.cloud.compatibility-verifier.enabled=false

