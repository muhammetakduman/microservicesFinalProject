server.port=8088

# Database
spring.datasource.url=jdbc:postgresql://localhost:5439/notification_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=notification-service
eureka.instance.prefer-ip-address=true

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
rabbitmq.exchange=marketplace.exchange
rabbitmq.queue.notification=notification.queue
rabbitmq.routing-key.notification-email=notification.email

spring.cloud.compatibility-verifier.enabled=false

