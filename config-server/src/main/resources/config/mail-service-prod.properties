server.port=8088

# Database
spring.datasource.url=jdbc:postgresql://notification-postgres:5432/notification_db
spring.datasource.username=postgres
spring.datasource.password=${NOTIFICATION_DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Eureka
eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka
eureka.instance.hostname=mail-service
eureka.instance.prefer-ip-address=true

# RabbitMQ
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER:marketplace_admin}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:SaforyRabbit2024!}
rabbitmq.exchange=marketplace.exchange
rabbitmq.queue.notification=notification.queue
rabbitmq.routing-key.notification-email=notification.email

# Gmail SMTP
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:saforyecommerce@gmail.com}
spring.mail.password=${MAIL_PASSWORD:gfyntdhmnachaxjf}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.default-encoding=UTF-8
mail.from.name=${MAIL_FROM_NAME:Safory Ecommerce}

spring.cloud.compatibility-verifier.enabled=false

