server.port=8089

# Database
spring.datasource.url=jdbc:postgresql://stock-postgres:5432/stock_db
spring.datasource.username=postgres
spring.datasource.password=${STOCK_DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Eureka
eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka
eureka.instance.hostname=stock-service
eureka.instance.prefer-ip-address=true

# RabbitMQ
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER:marketplace_admin}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:SaforyRabbit2024!}
rabbitmq.exchange=marketplace.exchange
rabbitmq.queue.order-created=order.created.queue
rabbitmq.queue.payment-success=payment.success.queue
rabbitmq.queue.payment-failed=payment.failed.queue
rabbitmq.queue.stock-reserved=stock.reserved.queue
rabbitmq.queue.stock-not-available=stock.not-available.queue
rabbitmq.routing-key.order-created=order.created
rabbitmq.routing-key.payment-success=payment.success
rabbitmq.routing-key.payment-failed=payment.failed
rabbitmq.routing-key.stock-reserved=stock.reserved
rabbitmq.routing-key.stock-not-available=stock.not-available

management.endpoints.web.exposure.include=*
management.endpoints.web.base-path=/actuator

spring.cloud.compatibility-verifier.enabled=false

