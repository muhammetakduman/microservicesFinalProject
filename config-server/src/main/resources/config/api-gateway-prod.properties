server.port=8080

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URI:http://discovery-server:8761/eureka}
eureka.instance.hostname=api-gateway
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# JWT (auth-service ile AYNI)
jwt.secret=${JWT_SECRET:marketplace-super-secret-key-for-hs256-2024!}

spring.cloud.compatibility-verifier.enabled=false

# ============================================================
# Spring Cloud Gateway Server WebMVC ? Route Tan?mlamalar?
# (Eureka üzerinden lb://SERVICE-ID)
# ============================================================

# Auth Service
spring.cloud.gateway.server.webmvc.routes[0].id=AUTH-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/auth/**

# User Service
spring.cloud.gateway.server.webmvc.routes[1].id=USER-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/users/**

# Product Service
spring.cloud.gateway.server.webmvc.routes[2].id=PRODUCT-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://PRODUCT-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/products/**

# Cart Service
spring.cloud.gateway.server.webmvc.routes[3].id=CART-SERVICE
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://CART-SERVICE
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/cart/**

# Order Service
spring.cloud.gateway.server.webmvc.routes[4].id=ORDER-SERVICE
spring.cloud.gateway.server.webmvc.routes[4].uri=lb://ORDER-SERVICE
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/api/orders/**

# Payment Service
spring.cloud.gateway.server.webmvc.routes[5].id=PAYMENT-SERVICE
spring.cloud.gateway.server.webmvc.routes[5].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.server.webmvc.routes[5].predicates[0]=Path=/api/payments/**

# Stock Service
spring.cloud.gateway.server.webmvc.routes[6].id=STOCK-SERVICE
spring.cloud.gateway.server.webmvc.routes[6].uri=lb://STOCK-SERVICE
spring.cloud.gateway.server.webmvc.routes[6].predicates[0]=Path=/api/v1/stocks/**

# Mail Service (Notification API)
spring.cloud.gateway.server.webmvc.routes[7].id=MAIL-SERVICE
spring.cloud.gateway.server.webmvc.routes[7].uri=lb://MAIL-SERVICE
spring.cloud.gateway.server.webmvc.routes[7].predicates[0]=Path=/api/notifications/**


